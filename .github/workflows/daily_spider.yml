# 每日采集规模与指数、更新 data.json，并提交供 GitHub Pages 展示（根目录 index.html + data.json）
# 触发：北京时间 20:00（UTC 12:00）+ 手动 workflow_dispatch
# Pages：仓库 Settings → Pages → Deploy from branch「main」文件夹「/ (root)」

name: Daily CSI300 ETF Scale

on:
  schedule:
    # UTC 12:00 = 北京时间 20:00
    - cron: "0 12 * * *"
  workflow_dispatch:

jobs:
  crawl-and-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run scraper
        run: python scraper.py

      - name: Commit and push data for Pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add etf_scale_history.csv data.json index.html .nojekyll
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update ETF scale data and dashboard [skip ci]"
            git push
          fi
